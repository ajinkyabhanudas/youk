<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
<defs>

  <!-- Background: very dark blue-black -->
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
    <stop offset="0%"   stop-color="#06090f"/>
    <stop offset="100%" stop-color="#070c16"/>
  </linearGradient>

  <!-- Radial spotlight behind center wordmark -->
  <radialGradient id="center-spot" cx="42.5%" cy="50%" r="22%">
    <stop offset="0%"   stop-color="#0c1828" stop-opacity="1"/>
    <stop offset="100%" stop-color="#06090f" stop-opacity="1"/>
  </radialGradient>

  <!-- Session #30 card border: electric blue → emerald (growth signal) -->
  <linearGradient id="rich-border" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
    <stop offset="0%"   stop-color="#3b82f6"/>
    <stop offset="55%"  stop-color="#1d4ed8"/>
    <stop offset="100%" stop-color="#10b981"/>
  </linearGradient>

  <!-- Wordmark accent line: blue fading right -->
  <linearGradient id="wm-line" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
    <stop offset="0%"   stop-color="#3b82f6"/>
    <stop offset="65%"  stop-color="#3b82f6" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
  </linearGradient>

  <!-- Dot grid texture -->
  <pattern id="dotgrid" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="14" cy="14" r="0.8" fill="#3b82f6" fill-opacity="0.09"/>
  </pattern>

  <!-- Wordmark glow -->
  <filter id="wm-glow">
    <feGaussianBlur stdDeviation="10" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Accent line glow -->
  <filter id="ln-glow">
    <feGaussianBlur stdDeviation="3.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Rich card ambient glow -->
  <filter id="rich-glow" x="-12%" y="-8%" width="124%" height="116%">
    <feGaussianBlur stdDeviation="22" result="b"/>
    <feColorMatrix in="b" type="matrix"
      values="0 0 0 0 0.23  0 0 0 0 0.51  0 0 0 0 0.96  0 0 0 0.22 0" result="tinted"/>
    <feMerge>
      <feMergeNode in="tinted"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

</defs>

<!-- ── BACKGROUND ── -->
<rect width="1280" height="640" fill="url(#bg)"/>
<rect width="1280" height="640" fill="url(#dotgrid)"/>
<rect width="1280" height="640" fill="url(#center-spot)"/>

<!-- ══════════════════════════════════════════════════════════ -->
<!-- SESSION #1 CARD — sparse, muted, intentionally empty      -->
<!-- ══════════════════════════════════════════════════════════ -->

<!-- Card label -->
<text x="196" y="90"
  text-anchor="middle"
  font-family="'SF Mono','JetBrains Mono','Cascadia Code',monospace"
  font-size="10" fill="#18273a" letter-spacing="2.5">SESSION  #1</text>

<!-- Card body -->
<rect x="20" y="100" width="352" height="468" rx="10"
  fill="#080c14" stroke="#141f2e" stroke-width="1.5"/>

<!-- Terminal header bar -->
<rect x="20" y="100" width="352" height="40" rx="10" fill="#0a1220"/>
<rect x="20" y="128" width="352" height="12"          fill="#0a1220"/>

<!-- Traffic lights (dim — inactive) -->
<circle cx="46" cy="120" r="5"   fill="#121c28"/>
<circle cx="63" cy="120" r="5"   fill="#121c28"/>
<circle cx="80" cy="120" r="5"   fill="#121c28"/>

<!-- Header text -->
<text x="196" y="124" text-anchor="middle"
  font-family="'SF Mono','JetBrains Mono',monospace"
  font-size="10.5" fill="#1c2f42" letter-spacing="0.3">youk — session #1</text>

<!-- Divider -->
<text x="38" y="160"
  font-family="'SF Mono','JetBrains Mono',monospace"
  font-size="11" fill="#0c1b28">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>

<!-- Empty-state lines -->
<text x="38" y="192" font-family="'SF Mono','JetBrains Mono',monospace" font-size="12" fill="#263748">No contracts saved yet.</text>
<text x="38" y="213" font-family="'SF Mono','JetBrains Mono',monospace" font-size="12" fill="#263748">No codebase map.</text>
<text x="38" y="234" font-family="'SF Mono','JetBrains Mono',monospace" font-size="12" fill="#263748">No prior context.</text>

<!-- Lots of empty space — intentional, communicates emptiness -->

<!-- Ready prompt (very muted) -->
<text x="38" y="400" font-family="'SF Mono','JetBrains Mono',monospace" font-size="12" fill="#18283a">Ready. What are we building?</text>

<!-- Dim cursor -->
<rect x="38" y="410" width="7" height="12" rx="1" fill="#1a2b3a"/>


<!-- ══════════════════════════════════════════════════════════════ -->
<!-- CENTER — youk wordmark + transition narrative                  -->
<!-- ══════════════════════════════════════════════════════════════ -->

<!-- youk wordmark -->
<text
  x="545" y="294"
  text-anchor="middle"
  font-family="'SF Mono','JetBrains Mono','Cascadia Code','Fira Code',monospace"
  font-size="78"
  font-weight="700"
  letter-spacing="-3"
  fill="#ffffff"
  filter="url(#wm-glow)"
>youk</text>

<!-- Accent line below wordmark -->
<rect x="416" y="308" width="258" height="2" rx="1" fill="url(#wm-line)" filter="url(#ln-glow)"/>

<!-- Tagline -->
<text x="545" y="340"
  text-anchor="middle"
  font-family="'SF Mono','JetBrains Mono',monospace"
  font-size="12.5" fill="#1e3448" letter-spacing="0.2">every session builds on the last</text>

<!-- Session transition indicator -->
<text x="545" y="404"
  text-anchor="middle"
  font-family="'SF Mono','JetBrains Mono',monospace"
  font-size="10.5" fill="#101e2c" letter-spacing="1.5">──── 30 sessions ────→</text>


<!-- ════════════════════════════════════════════════════════════════ -->
<!-- SESSION #30 CARD — rich, vibrant, gradient border, glowing      -->
<!-- ════════════════════════════════════════════════════════════════ -->

<!-- Card label -->
<text x="991" y="70"
  text-anchor="middle"
  font-family="'SF Mono','JetBrains Mono','Cascadia Code',monospace"
  font-size="10" fill="#1e3d6a" letter-spacing="2.5">SESSION  #30</text>

<!-- Ambient glow behind card (very soft blue) -->
<rect x="718" y="80" width="546" height="510" rx="12"
  fill="#1a40a0" opacity="0.06" filter="url(#rich-glow)"/>

<!-- Card gradient border -->
<rect x="718" y="80" width="546" height="510" rx="12" fill="url(#rich-border)"/>

<!-- Card surface (1.5px inset from border) -->
<rect x="719.5" y="81.5" width="543" height="507" rx="11" fill="#070b14"/>

<!-- Terminal header bar -->
<rect x="719.5" y="81.5"  width="543" height="44"   rx="11" fill="#08111e"/>
<rect x="719.5" y="113.5" width="543" height="12"         fill="#08111e"/>

<!-- Traffic lights (subtly present — active session) -->
<circle cx="750" cy="103" r="5.5" fill="#162030"/>
<circle cx="769" cy="103" r="5.5" fill="#162030"/>
<circle cx="788" cy="103" r="5.5" fill="#162030"/>

<!-- Header text -->
<text x="991" y="107" text-anchor="middle"
  font-family="'SF Mono','JetBrains Mono',monospace"
  font-size="11" fill="#28405a" letter-spacing="0.3">youk — session #30 on my-app</text>

<!-- ── Card content ── -->

<!-- Divider -->
<text x="740" y="147"
  font-family="'SF Mono','JetBrains Mono',monospace"
  font-size="11" fill="#0c1c30">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>

<!-- Resume point -->
<text x="740" y="173" font-family="'SF Mono','JetBrains Mono',monospace" font-size="12" fill="#3e5870">Picked up from</text>
<text x="757" y="192" font-family="'SF Mono','JetBrains Mono',monospace" font-size="12" fill="#6e8aa6">In progress: implement rate limiting middleware</text>

<!-- Session plan -->
<text x="740" y="220" font-family="'SF Mono','JetBrains Mono',monospace" font-size="12" fill="#3e5870">Today's plan</text>
<text x="757" y="239" font-family="'SF Mono','JetBrains Mono',monospace" font-size="12" fill="#6e8aa6">1.  Complete rate limiting middleware</text>
<text x="757" y="258" font-family="'SF Mono','JetBrains Mono',monospace" font-size="12" fill="#6e8aa6">2.  Run integration tests</text>
<text x="757" y="277" font-family="'SF Mono','JetBrains Mono',monospace" font-size="12" fill="#6e8aa6">3.  Ship</text>

<!-- Divider -->
<text x="740" y="301"
  font-family="'SF Mono','JetBrains Mono',monospace"
  font-size="11" fill="#0c1c30">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>

<!-- Rules / concepts line — dual color (the money line) -->
<text x="740" y="326" font-family="'SF Mono','JetBrains Mono',monospace" font-size="12">
  <tspan fill="#3b82f6">14 rules active</tspan>
  <tspan fill="#18283c">  ·  </tspan>
  <tspan fill="#10b981">8 domain concepts</tspan>
  <tspan fill="#18283c">  ·  session #30</tspan>
</text>

<!-- Most recent contract (quoted) -->
<text x="740" y="347" font-family="'SF Mono','JetBrains Mono',monospace" font-size="12" fill="#253a52">"never mock the database in integration tests"</text>

<!-- Divider -->
<text x="740" y="371"
  font-family="'SF Mono','JetBrains Mono',monospace"
  font-size="11" fill="#0c1c30">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>

<!-- Milestone note -->
<text x="740" y="396" font-family="'SF Mono','JetBrains Mono',monospace" font-size="12" fill="#253848">30 sessions in — your rules load faster than you'd</text>
<text x="740" y="415" font-family="'SF Mono','JetBrains Mono',monospace" font-size="12" fill="#253848">re-explain them.</text>

<!-- Divider -->
<text x="740" y="439"
  font-family="'SF Mono','JetBrains Mono',monospace"
  font-size="11" fill="#0c1c30">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>

<!-- Commands -->
<text x="740" y="464" font-family="'SF Mono','JetBrains Mono',monospace" font-size="12" fill="#162a3c">Commands: /build · /done · /check · /health · /plan</text>

<!-- Ready prompt -->
<text x="740" y="496" font-family="'SF Mono','JetBrains Mono',monospace" font-size="12" fill="#1e3448">Ready. What's first?</text>

<!-- Blinking cursor (SMIL animation — renders on GitHub) -->
<rect x="740" y="504" width="7" height="13" rx="1" fill="#3b82f6" opacity="0.85">
  <animate attributeName="opacity" values="0.85;0;0.85" dur="1.1s" repeatCount="indefinite"/>
</rect>

<!-- ── FOOTER ── -->
<text x="640" y="626"
  text-anchor="middle"
  font-family="'SF Mono','JetBrains Mono',monospace"
  font-size="9.5" fill="#0d1b28" letter-spacing="2.5">AMBIENT ENGINEERING INTELLIGENCE  ·  MIT LICENSE</text>

</svg>
