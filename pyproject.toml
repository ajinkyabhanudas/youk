[tool.pytest.ini_options]
addopts = "--cov=servers --cov-report=term-missing --cov-fail-under=45 -m 'not integration'"
markers = [
    "integration: integration tests requiring Docker (excluded from make test)",
]

[tool.coverage.run]
omit = ["tests/*", "scripts/*"]

[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
ignore = [
    "E402",   # module-level import not at top — sys.path.insert required before shared imports
    "E501",   # line too long — pre-existing in generated code, not enforced
    "I001",   # import sort — sys.path.insert splits import blocks intentionally
    "UP007",  # use X | Y for Union — keep Optional where it aids readability
    "UP045",  # use X | None for Optional — same as UP007
]
