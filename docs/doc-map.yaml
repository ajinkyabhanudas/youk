# doc-map.yaml — maps code artifacts to their documentation references.
#
# Update this file alongside the code change that adds or removes a tool,
# skill, or significant source file. session_start reads this and flags
# any @mcp.tool() in server.py that is absent from this map — surfacing
# it in session_plan as a doc-sync item so no new session starts blind.
#
# refs: list of files that must be updated when the artifact changes.
# Add, rename, or remove entries here when you ship the code change.

mcp_tools:
  youk-core:
    - {tool: session_start, refs: [README.md, docs/claude-md-template.md]}
    - {tool: session_end, refs: [README.md, docs/claude-md-template.md]}
    - {tool: optimize_intent, refs: [README.md]}
    - {tool: route_task, refs: [README.md, docs/claude-md-template.md]}
    - {tool: check_command, refs: [README.md]}
    - {tool: save_contract, refs: [README.md, docs/claude-md-template.md]}
    - {tool: self_heal, refs: [README.md, docs/claude-md-template.md]}
    - {tool: add_proposal, refs: [README.md]}
    - {tool: get_proposals, refs: [README.md]}
    - {tool: apply_proposal, refs: [README.md]}
    - {tool: task_checkpoint, refs: [README.md, docs/claude-md-template.md]}
    - {tool: compact_context, refs: [README.md, docs/claude-md-template.md]}
    - {tool: track_tokens, refs: [README.md, docs/claude-md-template.md]}
    - {tool: check_doc_graph, refs: [README.md, docs/doc-map.yaml]}
    - {tool: promote_to_global_contracts, refs: [README.md, docs/claude-md-template.md]}
    - {tool: check_nfr_gate, refs: [README.md, docs/claude-md-template.md]}
    - {tool: task_contract, refs: [README.md, docs/claude-md-template.md]}
    - {tool: approve_task_contract, refs: [README.md, docs/claude-md-template.md]}
    - {tool: check_task_contract_gate, refs: [README.md, docs/claude-md-template.md]}

  youk-code:
    - {tool: nfr_check, refs: [README.md, docs/claude-md-template.md]}
    - {tool: route_to_skill, refs: [README.md, docs/claude-md-template.md]}
    - {tool: check_commit_quality, refs: [README.md]}
    - {tool: list_skills, refs: [README.md]}
    - {tool: generate_skill, refs: [README.md]}
    - {tool: assess_skill, refs: [README.md]}
    - {tool: generate_stack_overlay, refs: [README.md, skills/stack-overlay-schema.md]}
    - {tool: detect_skill_gaps, refs: [README.md]}

src_files:
  - {file: servers/core/src/server.py, refs: [README.md]}
  - {file: servers/core/src/session.py, refs: [README.md]}
  - {file: servers/core/src/routing.py, refs: [README.md]}
  - {file: servers/core/src/health.py, refs: [README.md]}
  - {file: servers/core/src/compaction.py, refs: [README.md]}
  - {file: servers/core/src/tokens.py, refs: [README.md]}
  - {file: servers/shared/models.py, refs: [README.md]}
  - {file: servers/code/src/server.py, refs: [README.md]}
  - {file: servers/code/src/nfr.py, refs: [README.md]}
  - {file: servers/code/src/skills.py, refs: [README.md]}
  - {file: scripts/dashboard.py, refs: [README.md, Makefile]}

skills:
  - {skill: start, refs: [README.md, docs/claude-md-template.md]}
  - {skill: code-review, refs: [README.md]}
  - {skill: security-review, refs: [README.md]}
  - {skill: dev-loop, refs: [README.md]}
  - {skill: verify, refs: [README.md]}
  - {skill: humanize, refs: [README.md]}
  - {skill: nfr-check, refs: [README.md]}
  - {skill: adr, refs: [README.md]}
  - {skill: write-spec, refs: [README.md]}
  - {skill: youk-research, refs: [README.md]}
  - {skill: simulate-experience, refs: [README.md]}

# Concept coherence graph — each concept has exactly one authority file.
# Derived files implement the concept; they must not redefine it.
# check_doc_graph() and session_start._check_doc_freshness() use this
# to surface drift within one session of the authority file changing.
concepts:
  - concept: north_star
    description: "What youk is fundamentally for — compounds user ability, not just tool context"
    authority: knowledge/projects/youk/PRD.md
    derived_in:
      - README.md
      - PHILOSOPHY.md
      - ~/.claude/CLAUDE.md

  - concept: org_score_definition
    description: "org_score formula: 5.0 base + capability_skill_rate (2.0) + close_rate (0.5) + gap_resolution (0.5) + prevented_cost (0.5) + framing_accuracy (0.5); ceiling 9.0"
    authority: docs/well-architected.md
    derived_in:
      - README.md
      - servers/core/src/health.py

  - concept: compounding_mechanism
    description: "How sessions compound: capability skills + close_cluster + /learn"
    authority: knowledge/projects/youk/PRD.md
    derived_in:
      - README.md
      - ~/.claude/CLAUDE.md

  - concept: guardrail_contract
    description: "Hard vs soft rules — what is enforced at tool level vs surfaced as nudge"
    authority: config/guardrails.yaml
    derived_in:
      - PHILOSOPHY.md
      - docs/well-architected.md

  - concept: api_key_required
    description: "Whether an ANTHROPIC_API_KEY is required to install and run youk"
    authority: scripts/install.sh
    derived_in:
      - README.md
      - docs/getting-started.md
      - docs/scheduling.md
      - CONTRIBUTING.md

  - concept: session_close_contract
    description: "What /done does and which phrases trigger it"
    authority: ~/.claude/CLAUDE.md
    derived_in:
      - docs/claude-md-template.md
      - docs/getting-started.md
      - skills/done/SKILL.md

  - concept: mcp_registration_command
    description: "Exact docker run command used to register MCP servers"
    authority: scripts/install.sh
    derived_in:
      - docs/getting-started.md
      - README.md

  - concept: context_hook_architecture
    description: "Three hooks (PreCompact, UserPromptSubmit, PostToolUse) that manage context automatically"
    authority: plugin/hooks/hooks.json
    derived_in:
      - docs/getting-started.md
      - docs/well-architected.md
      - README.md

  - concept: intent_gated_brief
    description: "build_brief mode=index returns ~100-200 token brief gated on intent keywords"
    authority: servers/core/src/compaction.py
    derived_in:
      - docs/well-architected.md

  - concept: active_task_state
    description: "PostToolUse hook writes state/active_task.json for post-compact resume accuracy"
    authority: plugin/scripts/post_tool_use.py
    derived_in:
      - docs/getting-started.md

  - concept: scope_collapse_gate
    description: "optimize_intent models solution fork before asking; ambiguity_detected=true blocks route_task until resolved"
    authority: servers/core/src/intent.py
    derived_in:
      - ~/.claude/CLAUDE.md
      - skills/dev-loop/SKILL.md
      - knowledge/projects/youk/decisions.md

  - concept: nfr_gate
    description: "check_nfr_gate blocks M+ dev-loop until an NFR Decision Block is supplied; XS/S always pass"
    authority: servers/core/src/nfr_gate.py
    derived_in:
      - ~/.claude/CLAUDE.md
      - skills/dev-loop/SKILL.md
